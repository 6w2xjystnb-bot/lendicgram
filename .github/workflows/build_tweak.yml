name: Build LendicTweak (Maple/Yandex Music)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show Xcode version
      run: |
        xcodebuild -version
        xcrun --sdk iphoneos --show-sdk-path

    - name: Compile LendicTweak.dylib
      run: |
        echo "🔨 Compiling LendicTweak.dylib..."
        mkdir -p LendicTweak
        xcrun -sdk iphoneos clang \
          -shared \
          -o LendicTweak/LendicTweak.dylib \
          LendicTweak/LendicTweak.m \
          -framework Foundation \
          -framework AVFoundation \
          -framework UIKit \
          -framework Security \
          -target arm64-apple-ios10.0 \
          -fobjc-arc \
          -O2 \
          -Wno-unused-variable \
          -Wno-deprecated-declarations
        echo "✅ Compiled!"
        file LendicTweak/LendicTweak.dylib
        ls -lh LendicTweak/LendicTweak.dylib

    - name: Fix dylib install name
      run: |
        install_name_tool \
          -id "@executable_path/LendicTweak.dylib" \
          LendicTweak/LendicTweak.dylib
        echo "✅ Install name fixed"

    - name: Upload dylib (standalone)
      uses: actions/upload-artifact@v4
      with:
        name: LendicTweak.dylib
        path: LendicTweak/LendicTweak.dylib
        retention-days: 90

    - name: Install Git LFS and pull IPA
      run: |
        git lfs install
        git lfs pull
        echo "📦 Files after LFS pull:"
        ls -lh *.ipa 2>/dev/null || echo "No IPA in root"
        find . -name "*.ipa" -not -path "./.git/*" | head -5

    - name: Install insert_dylib
      run: |
        echo "📦 Building insert_dylib..."
        git clone https://github.com/tyilo/insert_dylib.git /tmp/insert_dylib
        cd /tmp/insert_dylib
        xcodebuild -project insert_dylib.xcodeproj \
          -target insert_dylib \
          -configuration Release \
          ONLY_ACTIVE_ARCH=NO 2>/dev/null || true
        if [ -f build/Release/insert_dylib ]; then
          sudo cp build/Release/insert_dylib /usr/local/bin/insert_dylib
        else
          echo "xcodebuild failed, trying clang fallback..."
          clang -o /usr/local/bin/insert_dylib \
            insert_dylib/main.c \
            -framework Foundation \
            -framework Security \
            2>/dev/null || true
        fi
        sudo chmod +x /usr/local/bin/insert_dylib
        insert_dylib --version 2>/dev/null || echo "(no version flag, binary exists: $(ls -la /usr/local/bin/insert_dylib))"

    - name: Patch IPA (blenka.ipa)
      run: |
        IPA_FILE=$(find . -maxdepth 2 -name "*.ipa" -not -path "./.git/*" | head -1)

        if [ -z "$IPA_FILE" ]; then
          echo "⚠️ No IPA found — uploading dylib only."
          mkdir -p output
          cp LendicTweak/LendicTweak.dylib output/
          exit 0
        fi

        echo "📱 Found IPA: $IPA_FILE ($(du -h "$IPA_FILE" | cut -f1))"
        mkdir -p extracted
        unzip -q "$IPA_FILE" -d extracted

        APP_DIR=$(find extracted/Payload -name "*.app" -maxdepth 1 | head -1)
        if [ -z "$APP_DIR" ]; then
          echo "❌ No .app found in Payload"
          find extracted -maxdepth 3 -type d | head -10
          exit 1
        fi

        APP_NAME=$(basename "$APP_DIR" .app)
        BINARY="$APP_DIR/$APP_NAME"

        echo "📱 App: $APP_NAME"
        echo "📱 Binary: $BINARY ($(file "$BINARY" | cut -d: -f2))"

        # Copy dylib next to binary
        cp LendicTweak/LendicTweak.dylib "$APP_DIR/LendicTweak.dylib"
        echo "✅ Dylib copied"

        # Inject LC_LOAD_DYLIB
        DYLIB_PATH="@executable_path/LendicTweak.dylib"
        echo "💉 Injecting: $DYLIB_PATH"

        if /usr/local/bin/insert_dylib --strip-codesig --inplace "$DYLIB_PATH" "$BINARY"; then
          echo "✅ inject_dylib succeeded"
        else
          EC=$?
          echo "⚠️ insert_dylib failed (ec=$EC), trying --all-yes..."
          /usr/local/bin/insert_dylib --strip-codesig --all-yes "$DYLIB_PATH" "$BINARY" && echo "✅ --all-yes worked" || true
        fi

        # Verify injection
        otool -l "$BINARY" | grep -A2 LC_LOAD_DYLIB | grep -o "@executable.*" | head -5

        # Strip code signatures
        rm -rf "$APP_DIR/_CodeSignature"
        rm -f  "$APP_DIR/embedded.mobileprovision"
        find "$APP_DIR" -name "_CodeSignature" -exec rm -rf {} + 2>/dev/null || true

        # Repack
        mkdir -p output
        cd extracted && zip -qr "../output/blenka_lendic.ipa" Payload/ && cd ..
        echo "✅ Patched IPA ready:"
        ls -lh output/

    - name: Upload patched IPA
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: blenka_lendic
        path: output/blenka_lendic.ipa
        retention-days: 90
