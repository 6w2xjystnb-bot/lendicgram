name: Build LendicgramVK IPA (AltStore)

on:
  push:
    branches:
      - claude/ios-vk-client-liquid-glass-4JT1A
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Pick the newest Xcode available ─────────────────────────────────
      - name: Select latest Xcode
        run: |
          echo "Available Xcode versions:"
          ls /Applications/ | grep Xcode | sort -V

          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      # ── 3. Detect best iOS SDK ──────────────────────────────────────────────
      - name: Detect iOS SDK
        id: sdk
        run: |
          SDK=$(xcodebuild -showsdks 2>/dev/null \
            | grep 'iphoneos' \
            | awk '{print $NF}' \
            | sort -V | tail -1)
          echo "sdk=$SDK" >> "$GITHUB_OUTPUT"
          echo "Chosen SDK: $SDK"

          # Set deployment target: use 26.0 if available, else 17.0
          if xcodebuild -showsdks 2>/dev/null | grep -q 'iphoneos26'; then
            echo "deploy=26.0" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=17.0" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Build (no code signing) ─────────────────────────────────────────
      - name: Build LendicgramVK
        run: |
          set -euo pipefail

          SDK="${{ steps.sdk.outputs.sdk }}"
          DEPLOY="${{ steps.sdk.outputs.deploy }}"
          echo "▶ SDK=$SDK  DEPLOY_TARGET=$DEPLOY"

          xcodebuild \
            -project LendicgramVK/LendicgramVK.xcodeproj \
            -scheme LendicgramVK \
            -configuration Release \
            -sdk "$SDK" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            IPHONEOS_DEPLOYMENT_TARGET="$DEPLOY" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/build/Release-iphoneos" \
            build \
            | xcpretty --color --simple 2>/dev/null \
            || tee /tmp/build.log; \
            EXIT=${PIPESTATUS[0]}; [ "$EXIT" -eq 0 ] || { cat /tmp/build.log; exit "$EXIT"; }

      # ── 5. Package .app → .ipa ─────────────────────────────────────────────
      - name: Package IPA
        run: |
          set -euo pipefail

          BUILD_DIR="$GITHUB_WORKSPACE/build/Release-iphoneos"
          echo "Build dir contents:"
          ls -lh "$BUILD_DIR" || true

          APP=$(find "$BUILD_DIR" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "❌ No .app found in $BUILD_DIR"
            exit 1
          fi
          echo "✅ App: $APP  ($(du -sh "$APP" | cut -f1))"

          rm -rf /tmp/ipa_stage
          mkdir -p /tmp/ipa_stage/Payload
          cp -r "$APP" /tmp/ipa_stage/Payload/

          cd /tmp/ipa_stage
          zip -qr "$GITHUB_WORKSPACE/LendicgramVK_AltStore.ipa" Payload/
          cd "$GITHUB_WORKSPACE"

          echo "📦 IPA: $(du -h LendicgramVK_AltStore.ipa | cut -f1)"
          ls -lh LendicgramVK_AltStore.ipa

      # ── 6. Verify IPA structure ─────────────────────────────────────────────
      - name: Verify IPA structure
        run: |
          unzip -l LendicgramVK_AltStore.ipa | head -30
          echo "---"
          BINARY=$(unzip -l LendicgramVK_AltStore.ipa \
            | awk '{print $4}' \
            | grep -E "Payload/[^/]+\.app/[^/]+$" \
            | grep -v '\.' | head -1)
          echo "Main binary path inside IPA: $BINARY"

      # ── 7. Generate AltStore source JSON (optional, for self-hosted source) ─
      - name: Generate AltStore source JSON
        run: |
          VERSION="1.0.$(date +%Y%m%d%H%M)"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIZE=$(wc -c < LendicgramVK_AltStore.ipa | tr -d ' ')

          cat > altstore_source.json << EOF
          {
            "name": "LendicgramVK",
            "identifier": "com.lendic.LendicgramVK",
            "sourceURL": "",
            "apps": [
              {
                "name": "LendicgramVK",
                "bundleIdentifier": "com.lendic.LendicgramVK",
                "developerName": "lendic42",
                "version": "$VERSION",
                "versionDate": "$DATE",
                "versionDescription": "Альтернативный VK клиент в стиле Whitegram.\nLiquid Glass tab bar (iOS 26).",
                "downloadURL": "",
                "localizedDescription": "Неофициальный клиент ВКонтакте с тёмной темой, фильтрами чатов, математическими обоями в переписке и нижней панелью навигации на базе Liquid Glass из iOS 26.",
                "iconURL": "",
                "tintColor": "66E096",
                "size": $SIZE,
                "screenshotURLs": [],
                "permissions": [
                  {
                    "type": "camera",
                    "usageDescription": "Нужен для съёмки видеосообщений и фотографий"
                  },
                  {
                    "type": "microphone",
                    "usageDescription": "Нужен для записи голосовых сообщений"
                  }
                ],
                "minOSVersion": "17.0"
              }
            ],
            "news": []
          }
          EOF

          echo "altstore_source.json generated:"
          cat altstore_source.json

      # ── 8. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LendicgramVK_AltStore
          path: LendicgramVK_AltStore.ipa
          retention-days: 90

      - name: Upload AltStore source JSON
        uses: actions/upload-artifact@v4
        with:
          name: altstore_source
          path: altstore_source.json
          retention-days: 90

      # ── 9. Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## LendicgramVK Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f LendicgramVK_AltStore.ipa ]; then
            SZ=$(du -h LendicgramVK_AltStore.ipa | cut -f1)
            echo "✅ **IPA size:** $SZ" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Установка через AltStore" >> "$GITHUB_STEP_SUMMARY"
            echo "1. Скачай **LendicgramVK_AltStore.ipa** из артефактов" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Перенеси на iPhone (AirDrop / Files)" >> "$GITHUB_STEP_SUMMARY"
            echo "3. Открой в **AltStore → My Apps → +** или нажми «Открыть с помощью AltStore»" >> "$GITHUB_STEP_SUMMARY"
            echo "4. AltStore сам подпишет IPA личным сертификатом Apple ID" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> IPA не подписан — AltStore/SideStore/Sideloadly подпишут его при установке." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ IPA не создан — см. логи выше." >> "$GITHUB_STEP_SUMMARY"
          fi
